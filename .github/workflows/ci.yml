name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python package ──────────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          # Copy root README so hatchling finds it (pyproject.toml lives in python/)
          cp ../README.md README.md
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: python
        run: ruff check pruvagraph/ --select F,I

      - name: Import check
        working-directory: python
        run: |
          python -c "import pruvagraph; print(pruvagraph.__version__)"

      - name: Run tests
        working-directory: python
        run: python -m pytest tests/ -v --tb=short

  # ── VS Code extension ───────────────────────────────────────
  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-dependencies --out pruvalex-pruvagraph-${{ github.sha }}.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: pruvagraph-vsix-${{ github.sha }}
          path: "*.vsix"
          retention-days: 14

  # ── Release: publish to PyPI + VS Code Marketplace ─────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [python, vscode]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python wheel
        working-directory: python
        run: |
          pip install build
          cp ../README.md README.md
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to VS Code Marketplace
        run: |
          npm install -g @vscode/vsce ovsx
          vsce publish --no-dependencies --pat ${{ secrets.VSCE_PAT }}
          ovsx publish --pat ${{ secrets.OVSX_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
