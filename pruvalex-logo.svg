<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Drop shadow filter — clean alternative to 18x <use> hack -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="6" dy="8" stdDeviation="4"
                    flood-color="#7A1A1A" flood-opacity="0.65"/>
    </filter>
    <!-- Gradient for hexagon face -->
    <linearGradient id="hex-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E53E3E"/>
      <stop offset="100%" stop-color="#9B2C2C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0D1117"/>

  <!-- Hexagon with proper drop shadow (replaces 18x <use> hack) -->
  <polygon
    points="256,43 441,150 441,363 256,469 71,363 71,150"
    fill="url(#hex-face)"
    filter="url(#shadow)"/>

  <!-- "P" letterform — centered, bold -->
  <text
    x="152" y="340"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="230"
    font-weight="900"
    fill="white"
    letter-spacing="-8">P</text>

  <!-- "+" accent mark — bottom-right corner -->
  <rect x="340" y="352" width="46" height="14" fill="white" opacity="0.9" rx="5"/>
  <rect x="360" y="332" width="14" height="54" fill="white" opacity="0.9" rx="5"/>
</svg>
